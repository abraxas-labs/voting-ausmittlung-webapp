<vo-lib-page [contentLoading]="loading"
  [header]="politicalBusinessResult && politicalBusinessResult.entryParams && bundle ? 'ELECTION.BALLOT_DETAIL.TITLE' : 'BALLOT_DETAIL.BUNDLE_DOES_NOT_EXIST.TITLE'">
  @if (politicalBusinessResult && politicalBusinessResult.entryParams && bundle) {
    <div class="content">
      <vo-ausm-majority-election-info [electionResult]="politicalBusinessResult"></vo-ausm-majority-election-info>
      <div class="content-box">
        <div class="ballot-content">
          <vo-ausm-ballot-header
            #header
            [automaticBallotNumberGeneration]="politicalBusinessResult.entryParams.automaticBallotNumberGeneration"
            [ballotNumber]="ballot?.number"
            [minBallotNumber]="minBallotNumber"
            [maxBallotNumber]="currentMaxBallotNumber"
            [canGoPrevious]="!isFirstBallot"
            [canGoNext]="!isLastBallot"
            [disabled]="loadingBallot"
            [actionExecuting]="actionExecuting"
            [readonly]="!bundleInProcessOrCorrection || politicalBusinessResult.election.contest!.locked"
            [canDeleteBallot]="!!ballot && isLastBallot"
            (deleteBallot)="deleteBallotAndNavigate()"
            (nextBallotRequest)="nextBallot()"
            (previousBallotRequest)="previousBallot()"
            (ballotNumberEntered)="changeBallotNumber($event)">
            @if (!header.readonly) {
              <bc-icon right class="clickable-icon" icon="question-circle-o" (click)="showShortcutDialog()"></bc-icon>
            }
          </vo-ausm-ballot-header>
          <vo-ausm-majority-election-ballot-contents
            (contentChanged)="contentChanged()"
            [ballot]="ballot"
            [loadingBallot]="loadingBallot"
            [disabled]="actionExecuting"
            [showInvalidVotes]="politicalBusinessResult.election.contest!.cantonDefaults!.majorityElectionInvalidVotes"
            [automaticEmptyVoteCounting]="politicalBusinessResult.entryParams.automaticEmptyVoteCounting"
            [showEmptyVotes]="politicalBusinessResult.election.numberOfMandates !== 1 || politicalBusinessResult.secondaryMajorityElectionResults.length > 0"
            [readonly]="!bundleInProcessOrCorrection
              || !canUpdateBallot
              || politicalBusinessResult.election.contest!.locked"
            [candidateCheckDigit]="politicalBusinessResult.entryParams.candidateCheckDigit">
          </vo-ausm-majority-election-ballot-contents>
        </div>
        <div class="p-3 pl-5">
          <vo-ausm-ballot-history [logs]="ballot?.logs" header="ELECTION.BALLOT_HISTORY.TITLE"></vo-ausm-ballot-history>
          <vo-ausm-majority-election-bundle-info [bundleSize]="politicalBusinessResult.entryParams.ballotBundleSize"
                                                 [bundle]="bundle"></vo-ausm-majority-election-bundle-info>
        </div>
      </div>
    </div>
    <ng-container page-footer>
      <vo-ausm-political-business-ballot-button-bar
        #footer
        class="content-box"
        [disabled]="loadingBallot"
        [actionExecuting]="actionExecuting"
        [readonly]="!canSubmitBundle || !bundleInProcessOrCorrection || politicalBusinessResult.election.contest!.locked"
        [canSubmitBundle]="bundle.countOfBallots > 0"
        [nextBallotEnabled]="!ballot || bundle.countOfBallots < politicalBusinessResult.entryParams.ballotBundleSize || !isLastBallot"
        (nextBallot)="nextBallot()"
        (back)="saveAndBack()"
        (submitBundle)="submitBundleAndNavigate()"></vo-ausm-political-business-ballot-button-bar>
    </ng-container>
  } @else {
    <div>
      <p class="pre-wrap">{{ 'BALLOT_DETAIL.BUNDLE_DOES_NOT_EXIST.ELECTION_DESCRIPTION' | translate }}</p>
      <p>
        <b>{{ 'APP.IMPORTANT' | translate }}: </b>
        <span>{{ 'BALLOT_DETAIL.BUNDLE_DOES_NOT_EXIST.CTA' | translate }}</span>
      </p>
    </div>
    <ng-container page-footer>
      <bc-button [label]="'APP.BACK' | translate" (buttonClick)="navigateBack()"></bc-button>
    </ng-container>
  }
</vo-lib-page>
