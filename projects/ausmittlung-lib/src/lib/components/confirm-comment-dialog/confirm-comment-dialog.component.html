<vo-lib-dialog [header]="title | translate" (dialogClose)="cancel()">
  <div content>
    <p>{{ message | translate }}</p>
    @if (hasComment) {
      <bc-label [label]="'APP.COMMENT' | translate" [optional]="true"></bc-label>
    }
    @if (hasComment) {
      <bc-textarea [(value)]="comment"></bc-textarea>
    }
  </div>

  <vo-lib-button-bar
    footer
    (cancel)="cancel()"
    [cancelLabel]="cancelText | translate"
    [saveLabel]="confirmText | translate"
    (save)="confirm()"
  ></vo-lib-button-bar>
</vo-lib-dialog>
