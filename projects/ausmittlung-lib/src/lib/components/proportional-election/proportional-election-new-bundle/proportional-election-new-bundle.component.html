<vo-lib-dialog [contentLoading]="loading" [header]="'PROPORTIONAL_ELECTION.SELECT_LIST_FOR_BUNDLE' | translate" (dialogClose)="close()">
  <div content>
    <div class="form-container">
      @if (enableBundleNumber) {
        <bc-number
          #bundleNumberFormfield
          class="my-2 field-number"
          [required]="true"
          [allowUndefined]="false"
          [label]="'POLITICAL_BUSINESS.BUNDLE_NUMBER' | translate"
          [value]="bundleNumber"
          [error]="!bundleNumber"
          (valueChange)="updateBundleNumber(+$event)"
          [subscriptSizing]="'dynamic'"
        >
        </bc-number>
      }
      <bc-text
        #listNumberFormfield
        class="m-2 field-number"
        [required]="true"
        [label]="'PROPORTIONAL_ELECTION.ENTER_LIST_NUMBER' | translate"
        [(value)]="listNumber"
        (valueChange)="selectList(false)"
        (keydown.enter)="selectList(true)"
        [subscriptSizing]="'dynamic'"
      ></bc-text>
      <div class="spacer"></div>
      <bc-button
        [disabled]="saving || (enableBundleNumber && !bundleNumber)"
        class="align-bottom"
        variant="tertiary"
        [label]="'PROPORTIONAL_ELECTION.BALLOT_WITHOUT_LIST' | translate"
        (buttonClick)="createBundle()"
      ></bc-button>
    </div>

    <div class="overflow">
      <bc-table [dataSource]="dataSource" selection #selection="selection" (selectionChange)="updateSelectedList($event)">
        <ng-container columnDef="select">
          <th bc-header-cell *headerCellDef></th>
          <td bc-data-cell *dataCellDef="let element">
            <bc-radio-button selectionToggle [selectionToggleValue]="element" [checked]="selection.isSelected(element)"></bc-radio-button>
          </td>
        </ng-container>

        <ng-container columnDef="orderNumber">
          <th bc-header-cell *headerCellDef>{{ 'PROPORTIONAL_ELECTION.LIST.ORDER_NUMBER' | translate }}</th>
          <td bc-data-cell *dataCellDef="let element">{{ element.orderNumber }}</td>
        </ng-container>

        <ng-container columnDef="shortDescription">
          <th bc-header-cell *headerCellDef>{{ 'PROPORTIONAL_ELECTION.LIST.SHORT_DESCRIPTION' | translate }}</th>
          <td bc-data-cell *dataCellDef="let element">{{ element.shortDescription }}</td>
        </ng-container>

        <ng-container columnDef="description">
          <th bc-header-cell *headerCellDef>{{ 'PROPORTIONAL_ELECTION.LIST.DESCRIPTION' | translate }}</th>
          <td bc-data-cell *dataCellDef="let element">{{ element.description }}</td>
        </ng-container>

        <tr bc-header-row *headerRowDef="let row; columns: columns"></tr>
        <tr bc-data-row
          *dataRowDef="let row; columns: columns"
          #rowSelection="selectionToggle"
          selectionToggle
          [selectionToggleValue]="row"
          selectionRow
          [selectionRowValue]="row"
          (click)="rowSelection.toggle()"
        ></tr>
      </bc-table>
    </div>
  </div>
  <vo-lib-button-bar
    footer
    (cancel)="close()"
    [saveLabel]="'PROPORTIONAL_ELECTION.SELECT_LIST' | translate"
    (save)="createBundle(selectedList)"
    [saving]="saving"
    [canSave]="!!selectedList && (!enableBundleNumber || !!bundleNumber)"
  >
  </vo-lib-button-bar>
</vo-lib-dialog>
