<vo-lib-dialog [header]="'CONTEST.DETAIL.ELECTORATE.DIALOG_TITLE' | translate" (dialogClose)="cancel()">
  <div content class="container">
    @for (electorate of electorates; track electorate; let index = $index) {
      <div class="electorates">
        <bc-text
          [label]="'CONTEST.DETAIL.ELECTORATE.DOMAIN_OF_INFLUENCE_TYPES' | translate"
          [readonly]="true"
          [required]="true"
          [value]="electorateLabelByIndex.get(index)"
          [subscriptSizing]="'dynamic'"
        ></bc-text>
        @if (!readonly) {
          <bc-button
            variant="tertiary"
            icon="plus"
            [label]="'CONTEST.DETAIL.ELECTORATE.ASSIGN_OPEN' | translate"
            (buttonClick)="assign(electorate)"
          ></bc-button>
        } @else {
          <div></div>
        }
        @if (!readonly) {
          <bc-icon icon="trash" iconColor="error" class="clickable" (click)="remove(index)"></bc-icon>
        } @else {
          <div></div>
        }
      </div>
    }

    @if (electorates.length === 0) {
      <p class="no-data my-2">{{ 'CONTEST.DETAIL.ELECTORATE.NO_DATA' | translate }}</p>
    }

    @if (!readonly) {
      <bc-button
        class="mt-2"
        variant="tertiary"
        icon="plus"
        [label]="'CONTEST.DETAIL.ELECTORATE.ADD' | translate"
        (buttonClick)="add()"
      ></bc-button>
    }
  </div>

  <vo-lib-button-bar
    footer
    [hasSaveButton]="!readonly"
    [saving]="saving"
    [canSave]="canSave"
    (save)="save()"
    (cancel)="cancel()"
  ></vo-lib-button-bar>
</vo-lib-dialog>
