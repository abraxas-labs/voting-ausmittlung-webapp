<vo-ausm-contest-detail-voting-cards-expansion-panel
  [header]="expansionPanelHeaderTitle">
  @for (voterTypeGroup of voterTypeGroups; track voterTypeGroup) {
    @if (voterTypeGroup.label) {
      <bc-label [label]="voterTypeGroup.label | translate"></bc-label>
    }
    <div class="count-of-voters mb-2">
      <bc-number
        [readonly]="readonly"
        [optionalText]="''"
        [min]="0"
        [(value)]="voterTypeGroup.menSubTotal.countOfVoters"
        (valueChange)="updateTotal()"
        [label]="'CONTEST.DETAIL.MEN' | translate"
        [subscriptSizing]="'dynamic'"
      ></bc-number>
      <bc-number
        [readonly]="readonly"
        [optionalText]="''"
        [min]="0"
        [(value)]="voterTypeGroup.womenSubTotal.countOfVoters"
        (valueChange)="updateTotal()"
        [label]="'CONTEST.DETAIL.WOMEN' | translate"
        [subscriptSizing]="'dynamic'"
      ></bc-number>
      <bc-number
        [readonly]="true"
        [tabIndex]="-1"
        [optionalText]="''"
        [value]="voterTypeGroup.total"
        [label]="'CONTEST.DETAIL.TOTAL' | translate"
        [subscriptSizing]="'dynamic'">
      </bc-number>
    </div>
  }

  <bc-checkbox
    [disabled]="true"
    [label]="'CONTEST.DETAIL.E_VOTING_ACTIVE' | translate"
    [checked]="eVoting"
    [subscriptSizing]="'dynamic'"
  ></bc-checkbox>
</vo-ausm-contest-detail-voting-cards-expansion-panel>
