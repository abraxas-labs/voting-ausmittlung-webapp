<vo-lib-dialog [header]="'CONTEST.DETAIL.COUNT_OF_VOTERS_AND_VOTING_CARDS' | translate" (dialogClose)="closeWithUnsavedChangesCheck()">
  <div content class="container">
    <vo-ausm-contest-detail-count-of-voters
      [readonly]="readonly"
      [eVoting]="eVoting"
      [enabledVoterTypes]="enabledVoterTypes"
      [countOfVotersInformationSubTotals]="countOfVotersInformationSubTotals"
      [domainOfInfluenceTypes]="domainOfInfluenceTypes"
      [electorates]="electorateSummary?.effectiveElectoratesList"
      (countOfVotersChange)="contentChanged()"
    ></vo-ausm-contest-detail-count-of-voters>

    @if (domainOfInfluenceTypes) {
      <vo-ausm-contest-detail-voting-cards
        [readonly]="readonly"
        [(votingCards)]="votingCards"
        (votingCardsChange)="contentChanged()"
        [enabledVotingCardChannels]="enabledVotingCardChannels"
        [domainOfInfluenceTypes]="domainOfInfluenceTypes"
        [electorates]="electorateSummary?.effectiveElectoratesList"
        [canton]="canton"
      ></vo-ausm-contest-detail-voting-cards>
    }

    @if (countingMachineEnabled) {
      <h4 translate class="mt-2">COUNTING_MACHINES.TITLE</h4>
      <bc-dropdown
        [required]="true"
        [readonly]="readonly"
        [items]="countingMachines"
        displayExpr="description"
        valueExpr="value"
        [(value)]="countingMachine"
        (valueChange)="contentChanged()"
        [clearable]="false"
        [subscriptSizing]="'dynamic'"
      ></bc-dropdown>
    }
  </div>

  <vo-lib-button-bar
    footer
    [hasSaveButton]="!readonly"
    [canSave]="true"
    (save)="save()"
    [sticky]="false"
    [cancelLabel]="(readonly ? 'APP.CLOSE' : 'COMMON.CANCEL') | translate"
    (cancel)="closeWithUnsavedChangesCheck()"
  ></vo-lib-button-bar>
</vo-lib-dialog>
