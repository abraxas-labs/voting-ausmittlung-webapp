@if (eVoting || eCounting) {
  <bc-tab-bar (selectedChange)="changeDataSource($event)">
    <bc-tab [label]="'VOTING_DATA_SOURCE.TOTAL' | translate"></bc-tab>
    <bc-tab [label]="'VOTING_DATA_SOURCE.CONVENTIONAL' | translate"></bc-tab>
    @if (eVoting) {
      <bc-tab [label]="'VOTING_DATA_SOURCE.E_VOTING' | translate"></bc-tab>
    }
    @if (eCounting) {
      <bc-tab [label]="'VOTING_DATA_SOURCE.E_COUNTING' | translate"></bc-tab>
    }
  </bc-tab-bar>
}
