<vo-lib-dialog [header]="'CONTEST.CHOOSE_COUNTING_CIRCLE.TITLE' | translate" (dialogClose)="done()">
  @if (countingCircles) {
    <div content class="m-2">
      <bc-dropdown
        class="full-width"
        [items]="countingCircles"
        displayExpr="name"
        (valueChange)="done($event)"
        [subscriptSizing]="'dynamic'"
      ></bc-dropdown>
    </div>
  }

  <vo-lib-button-bar footer [hasSaveButton]="false" [sticky]="false" (cancel)="done()"></vo-lib-button-bar>
</vo-lib-dialog>
