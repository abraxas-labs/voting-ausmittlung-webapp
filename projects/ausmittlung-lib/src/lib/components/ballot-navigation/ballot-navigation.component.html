<bc-number
  #navigationComponent
  [label]="labelBallotNumber | translate"
  optionalText=""
  [min]="allowUndefined ? undefined : minBallotNumber"
  [max]="allowUndefined ? undefined : maxBallotNumber"
  [error]="!allowUndefined && (!ballotNumberValue || ballotNumberValue < minBallotNumber || (!!maxBallotNumber && ballotNumberValue > maxBallotNumber))"
  [readonly]="readonly"
  [value]="ballotNumberValue"
  (valueChange)="changeBallotNumber($event)"
  (blur)="enterBallotNumber()"
  (keydown.enter)="enterBallotNumber()"
  [clearable]="false"
  [subscriptSizing]="'dynamic'"
></bc-number>
<div class="nav-buttons">
  <bc-button
    icon="angle-left"
    (buttonClick)="previousBallotRequest.emit()"
    [disabled]="readonly || !canGoPrevious"
  ></bc-button>
  <bc-button
    icon="angle-right"
    (buttonClick)="nextBallotRequest.emit()"
    [disabled]="readonly || !canGoNext"
  ></bc-button>
</div>
